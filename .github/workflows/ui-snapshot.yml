name: UI Snapshot

# Single visual-regression gate for the empty "/" landing
# (tests/e2e_ui/visual/test_landing_snapshot.py).
#
# Cross-OS rendering note: screenshots differ across operating systems (font
# rasterizer + hinting + anti-aliasing), so the committed baseline and the PR
# comparison MUST be produced by the same renderer. This workflow pins
# `ubuntu-24.04` (NOT `ubuntu-latest`, which drifts release-to-release) and is
# the single source of truth for the baseline. The test only renders the SPA,
# so it needs no LLM credentials and none of the heavy native-CLI setup the
# main e2e-ui suite uses.
#
# Triggers:
#   pull_request       compare the rendered landing against the committed
#                      baseline; fail (and upload actual/expected/diff PNGs) on
#                      any mismatch. No secrets, so fork PRs run fine.
#   workflow_dispatch  regenerate the baseline with --update-snapshots on this
#                      same pinned runner and upload it as the
#                      `ui-snapshot-baseline` artifact for a human to download,
#                      review, and commit. This is the only way to change the
#                      baseline.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch/ref to regenerate the baseline against"
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: ui-snapshot-${{ github.workflow }}-${{ github.event.pull_request.number || github.event.inputs.ref || github.ref }}
  cancel-in-progress: true

env:
  # No SPA build during `uv sync`: this workflow builds the bundle in a
  # dedicated step (mirrors e2e-ui.yml), so the setup.py build would be redundant.
  OMNIGENT_SKIP_WEB_UI: "true"

jobs:
  ui-snapshot:
    name: UI Snapshot (empty landing)
    # Pinned, not ubuntu-latest: the baseline's font rendering must stay stable.
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version-file: ".python-version"

      - name: Set up Node 20
        uses: ./.github/actions/setup-node

      - name: Install uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a  # v4
        with:
          enable-cache: true

      - name: Cache virtualenv
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684  # v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('.python-version') }}-${{ hashFiles('uv.lock') }}

      - name: Install project + dev extras
        run: uv sync --extra all --extra dev

      - name: Cache Playwright browsers
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4.3.0
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright Chromium
        run: uv run playwright install --with-deps chromium

      - name: Build ap-web SPA
        # Build BEFORE pytest: Vite's emptyOutDir clobbers the static dir, so
        # never run it alongside the live server. --legacy-peer-deps avoids
        # re-resolving the known React 19 peer conflict under @emoji-mart/react.
        env:
          NPM_CONFIG_REGISTRY: https://registry.npmjs.org/
        run: |
          cd ap-web
          npm ci --legacy-peer-deps --no-audit --no-fund
          npm run build

      - name: Compare (PR) or regenerate (dispatch) the landing snapshot
        id: snapshot
        # --ui-skip-build: the SPA was built in the previous step. On
        # workflow_dispatch we pass --update-snapshots, which rewrites the
        # baseline and intentionally fails the run so a human reviews the image.
        env:
          IS_UPDATE: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          EXTRA_ARGS=()
          if [[ "$IS_UPDATE" == "true" ]]; then
            EXTRA_ARGS+=(--update-snapshots)
          fi
          # -p no:rerunfailures: this gate is deterministic (one static page),
          # so reruns add nothing; the plugin also spins a teardown socket
          # thread that emits a noisy unhandled-exception warning when the
          # live_server subprocess is torn down.
          uv run pytest tests/e2e_ui/visual -m visual \
            -v --tb=long --log-level=INFO -r a \
            -p no:rerunfailures \
            --ui-skip-build \
            "${EXTRA_ARGS[@]}"

      - name: Upload regenerated baseline (dispatch runs)
        # --update-snapshots exits non-zero by design, but we still want the
        # regenerated PNG so the dev can download and commit it. Gate on the
        # snapshot step's own conclusion (success or failure) rather than
        # always(): if an earlier setup step crashed, the snapshot step is
        # skipped and we must NOT upload a stale/previous-run PNG as the new
        # "regenerated" baseline. if-no-files-found: error fails loudly if the
        # update somehow wrote nothing.
        if: >-
          ${{ github.event_name == 'workflow_dispatch'
            && (steps.snapshot.conclusion == 'success' || steps.snapshot.conclusion == 'failure') }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: ui-snapshot-baseline
          path: tests/e2e_ui/visual/snapshots/**
          if-no-files-found: error
          retention-days: 7

      - name: Upload diff + generated baseline on failure (PR runs)
        # Covers two failure cases on a PR run:
        #   snapshot_failures/  actual/expected/diff PNGs when the page drifted.
        #   snapshots/          the freshly generated baseline when none existed
        #                       yet (the plugin writes it and fails with "new
        #                       snapshot created"). This is the no-admin path to
        #                       seed the first baseline without workflow_dispatch:
        #                       download this artifact, commit the PNG, push.
        if: ${{ failure() && github.event_name == 'pull_request' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: ui-snapshot-diff-${{ github.run_id }}
          path: |
            tests/e2e_ui/visual/snapshot_failures/**
            tests/e2e_ui/visual/snapshots/**
          if-no-files-found: ignore
          retention-days: 7
