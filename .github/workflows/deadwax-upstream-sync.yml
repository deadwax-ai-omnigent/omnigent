name: Deadwax · Upstream Sync

# Weekly sync of omnigent-ai/omnigent (upstream) into our deadwax branch.
# Keeps a refreshed `upstream-sync` branch pointing at upstream/main and opens
# (or leaves open) a PR into `deadwax` for human review + conflict resolution.
# Customizations on `deadwax` are additive, so most syncs are clean.
#
# NOTE: GitHub disables scheduled workflows on forks by default — enable Actions
# on this fork, and turn on "Allow GitHub Actions to create and approve pull
# requests" (Settings → Actions → General) for the auto-PR step to work.

on:
  schedule:
    - cron: "0 9 * * 1" # Mondays 09:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout deadwax
        uses: actions/checkout@v4
        with:
          ref: deadwax
          fetch-depth: 0

      - name: Refresh upstream-sync branch from upstream/main
        run: |
          git remote add upstream https://github.com/omnigent-ai/omnigent.git
          git fetch upstream main
          # Point our origin's upstream-sync branch at the latest upstream main.
          git push origin upstream/main:refs/heads/upstream-sync --force

      - name: Open or refresh the sync PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh pr view upstream-sync --json state --jq .state 2>/dev/null | grep -q OPEN; then
            echo "Sync PR already open — it now reflects the latest upstream."
          else
            gh pr create \
              --base deadwax \
              --head upstream-sync \
              --title "⬆️ Upstream sync $(date +%Y-%m-%d)" \
              --body "Automated weekly sync of **omnigent-ai/omnigent** → \`deadwax\`. Review the diff, resolve any conflicts (our brand changes are additive, so conflicts should be rare), then merge. Contribute-back fixes branch off \`upstream/main\` separately." \
            || echo "Nothing new to sync (deadwax already up to date with upstream)."
          fi
